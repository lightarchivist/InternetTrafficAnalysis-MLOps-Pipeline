name: CD - Build and push to Docker Hub

on:
  workflow_run:
    workflows: ["CI - Train and evaluate model"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  publish_image:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set image tag
        id: meta
        run: echo "short_sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build image
        run: |
          docker build . -t lightarchivist/network-anomaly-detection:latest
          docker build . -t lightarchivist/network-anomaly-detection:${{ steps.meta.outputs.short_sha }}

      - name: Push image to Docker Hub
        run: |
          docker push lightarchivist/network-anomaly-detection:latest
          docker push lightarchivist/network-anomaly-detection:${{ steps.meta.outputs.short_sha }}

      - name: Update image tag in deployment manifest
        run: |
          SHORT_SHA=${{ steps.meta.outputs.short_sha }}
          sed -i "s|:IMAGE_TAG|:${SHORT_SHA}|g" k8s/deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet || git commit \
            -m "deploy: image ${{ steps.meta.outputs.short_sha }} [skip ci]"
          git push