apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-anomaly-detection
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/lightarchivist/InternetTrafficAnalysis-MLOps-Pipeline
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: anomaly-detection
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
